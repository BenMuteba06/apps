version: 1.0
runtime: python311
build:
  commands:
    pre-build:
      - python3 --version
      - pip3 --version
      - python3 healthcheck.py
    build:
      - pip3 install -r requirements.txt
run:
  runtime-version: 3.11
  pre-run:
    - pip3 install -r requirements.txt
  command: python3 -m streamlit run streamlit/app.py --server.port 8080 --server.address 0.0.0.0 --server.headless true --browser.gatherUsageStats false
  network:
    port: 8080